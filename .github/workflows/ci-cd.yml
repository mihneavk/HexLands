name: HexLands CI-CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # STAGIUL 1: RULAREA TESTELOR UNITARE
  run-unit-tests:
    name: Run Unity Unit Tests 
    runs-on: ubuntu-latest
    steps:
      # 1. Descarcă codul din Git
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      # 2. Caching pentru librării
      - name: Cache Library Folder
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: Library-

      # 3. Autentificarea oficială în Unity Hub (Versiunea v4)
      - name: Login to Unity
        uses: game-ci/unity-login@v4
        with:
          unityEmail: ${{ secrets.UNITY_EMAIL }}
          unityPassword: ${{ secrets.UNITY_PASSWORD }}

      # 4. Rulează Testele prin GameCI
      - name: Run Tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: auto 
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      # 5. Salvează rezultatele testelor
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test-Results
          path: ${{ steps.tests.outputs.artifactsPath }}

  # STAGIUL 2: COMPILAREA JOCULUI (BUILD)
  build-game:
    name: Build HexLands Game 
    needs: run-unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library Folder
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Build-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: Library-Build-

      # Autentificare și la Build (v4)
      - name: Login to Unity for Build
        uses: game-ci/unity-login@v4
        with:
          unityEmail: ${{ secrets.UNITY_EMAIL }}
          unityPassword: ${{ secrets.UNITY_PASSWORD }}

      # Construiește executabilul de Windows
      - name: Build Game
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: auto
          targetPlatform: StandaloneWindows64

      # Salvează executabilul final
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HexLands-Windows-Build
          path: build/StandaloneWindows64
