name: HexLands CI-CD Pipeline (Windows Self-Hosted)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # STAGIUL 1: RULAREA TESTELOR UNITARE ȘI AGENT EVALS
  run-unit-tests:
    name: Run Unity Unit Tests & Agent Evals
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      # Creează folderul de rezultate înainte de rulare pentru a evita erorile de cale
      - name: Create Build Directories
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path build/tests

      # Deschidem Unity 6 (6000.4.6f1) instalat pe calculatorul lui pentru a rula testele și evaluările de AI
      - name: Run Tests via Local Unity CLI
        shell: powershell
        run: |
          & "C:\Program Files\Unity\Hub\Editor\6000.4.6f1\Editor\Unity.exe" -batchmode -runTests -testPlatform EditMode -projectPath . -testResults build/tests/editmode-results.xml -logFile build/tests/unity-test-log.txt

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test-Results
          path: build/tests/

  # STAGIUL 2: COMPILAREA JOCULUI (BUILD)
  build-game:
    name: Build HexLands Game
    needs: run-unit-tests
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      # Generăm executabilul jocului folosind kitul local de Unity 6 (6000.4.6f1)
      - name: Build Game via Local Unity CLI
        shell: powershell
        run: |
          & "C:\Program Files\Unity\Hub\Editor\6000.4.6f1\Editor\Unity.exe" -batchmode -quit -projectPath . -buildWindows64Player build/StandaloneWindows64/HexLands.exe -logFile build/unity-build-log.txt

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HexLands-Windows-Build
          path: build/StandaloneWindows64
