name: HexLands CI-CD Pipeline 

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # STAGIUL 1: RULAREA TESTELOR UNITARE
  run-unit-tests:
    name: Run Unity Unit Tests 
    runs-on: ubuntu-latest
    steps:
      # 1. Descarcă codul din Git pe serverul virtual
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      # 2. Caching pentru librării (ca pipeline-ul să fie extrem de rapid data viitoare)
      - name: Cache Library Folder
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: Library-

      # 3. Rulează Testele prin GameCI (EditMode & PlayMode)
      - name: Run Tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: auto # Detectează automat versiunea ta de Unity din proiect
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      # 4. Salvează rezultatele testelor ca artefact pe GitHub în caz că vrei să le descarci
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test-Results
          path: ${{ steps.tests.outputs.artifactsPath }}

  # STAGIUL 2: COMPILAREA JOCULUI (BUILD) - Rulează DOAR dacă testele au trecut!
  build-game:
    name: Build HexLands Game 
    needs: run-unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library Folder
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Build-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: Library-Build-

      # Construiește executabilul de Windows (StandaloneWindows64)
      - name: Build Game
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: auto
          targetPlatform: StandaloneWindows64

      # Salvează executabilul final pe GitHub pentru a fi descărcat
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HexLands-Windows-Build
          path: build/StandaloneWindows64
