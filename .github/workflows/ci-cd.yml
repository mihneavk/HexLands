name: HexLands CI-CD Pipeline (Windows Self-Hosted)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # STAGIUL 1: RULAREA TESTELOR UNITARE ȘI AGENT EVALS
  run-unit-tests:
    name: Run Unity Unit Tests & Agent Evals
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run Tests & Agent Evals
        uses: game-ci/unity-test-runner@v4
        id: tests
        with:
          unityVersion: auto 
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test-Results
          path: ${{ steps.tests.outputs.artifactsPath }}

  # STAGIUL 2: COMPILAREA JOCULUI (BUILD)
  build-game:
    name: Build HexLands Game
    needs: run-unit-tests
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build Game
        uses: game-ci/unity-builder@v4
        with:
          unityVersion: auto
          targetPlatform: StandaloneWindows64

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HexLands-Windows-Build
          path: build/StandaloneWindows64
